<!doctype html>
<html>
  <head>
    <title>Autism Prediction</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <h2>Autism Prediction System 🧠</h2>

      <form action="/predict" method="post">
        <h3>AQ Test Scores</h3>

        <!-- A1 to A10 Dropdown (0 or 1) -->
        {% for i in range(1,11) %}
        <select name="A{{i}}_Score" required>
          <option value="">A{{i}} Score</option>
          <option value="0">0</option>
          <option value="1">1</option>
        </select>
        {% endfor %}

        <h3>Personal Information</h3>

        <!-- Age Range -->
        <label>Age: <span id="ageValue">25</span></label>
        <input
          type="range"
          name="age"
          min="1"
          max="100"
          value="25"
          oninput="ageValue.innerText = this.value"
        />

        <!-- Gender -->
        <select name="gender" required>
          <option value="">Select Gender</option>
          <option value="m">Male</option>
          <option value="f">Female</option>
        </select>

        <!-- Jaundice -->
        <select name="jaundice" required>
          <option value="">Jaundice</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <!-- Family History -->
        <select name="austim" required>
          <option value="">Family History</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <!-- Used App Before -->
        <select name="used_app_before" required>
          <option value="">Used App Before</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>

        <!-- Relation -->
        <select name="relation" required>
          <option value="">Relation</option>
          <option value="Self">Self</option>
          <option value="Others">Others</option>
        </select>

        <!-- Ethnicity Dropdown -->
        <select name="ethnicity" required>
          <option value="">Select Ethnicity</option>
          <option value="White-European">White-European</option>
          <option value="Asian">Asian</option>
          <option value="Black">Black</option>
          <option value="Hispanic">Hispanic</option>
          <option value="Middle Eastern ">Middle Eastern</option>
          <option value="Pasifika">Pasifika</option>
          <option value="Latino">Latino</option>
          <option value="South Asian">South Asian</option>
          <option value="Others">Others</option>
        </select>

        <!-- Country Dropdown -->
        <select name="contry_of_res" required style="height: 200px">
          <option value="">Select Country</option>

          <option value="Austria">Austria</option>
          <option value="India">India</option>
          <option value="United States">United States</option>
          <option value="South Africa">South Africa</option>
          <option value="Jordan">Jordan</option>
          <option value="United Kingdom">United Kingdom</option>
          <option value="Brazil">Brazil</option>
          <option value="New Zealand">New Zealand</option>
          <option value="Canada">Canada</option>
          <option value="Kazakhstan">Kazakhstan</option>
          <option value="United Arab Emirates">United Arab Emirates</option>
          <option value="Australia">Australia</option>
          <option value="Ukraine">Ukraine</option>
          <option value="Iraq">Iraq</option>
          <option value="France">France</option>
          <option value="Malaysia">Malaysia</option>
          <option value="Vietnam">Vietnam</option>
          <option value="Egypt">Egypt</option>
          <option value="Netherlands">Netherlands</option>
          <option value="Afghanistan">Afghanistan</option>
          <option value="Oman">Oman</option>
          <option value="Italy">Italy</option>
          <option value="Bahamas">Bahamas</option>
          <option value="Saudi Arabia">Saudi Arabia</option>
          <option value="Ireland">Ireland</option>
          <option value="Aruba">Aruba</option>
          <option value="Sri Lanka">Sri Lanka</option>
          <option value="Russia">Russia</option>
          <option value="Bolivia">Bolivia</option>
          <option value="Azerbaijan">Azerbaijan</option>
          <option value="Armenia">Armenia</option>
          <option value="Serbia">Serbia</option>
          <option value="Ethiopia">Ethiopia</option>
          <option value="Sweden">Sweden</option>
          <option value="Iceland">Iceland</option>
          <option value="China">China</option>
          <option value="Angola">Angola</option>
          <option value="Germany">Germany</option>
          <option value="Spain">Spain</option>
          <option value="Tonga">Tonga</option>
          <option value="Pakistan">Pakistan</option>
          <option value="Iran">Iran</option>
          <option value="Argentina">Argentina</option>
          <option value="Japan">Japan</option>
          <option value="Mexico">Mexico</option>
          <option value="Nicaragua">Nicaragua</option>
          <option value="Sierra Leone">Sierra Leone</option>
          <option value="Czech Republic">Czech Republic</option>
          <option value="Niger">Niger</option>
          <option value="Romania">Romania</option>
          <option value="Cyprus">Cyprus</option>
          <option value="Belgium">Belgium</option>
          <option value="Burundi">Burundi</option>
          <option value="Bangladesh">Bangladesh</option>
        </select>

        <button type="submit">Predict</button>
      </form>

      <div class="result">{{ prediction_text }}</div>
    </div>
  </body>
</html>
